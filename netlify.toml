[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  # Redirect any API call to the Netlify Function
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  # Redirect everything else to React app
  from = "/*"
  to = "/index.html"
  status = 200
